<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<title>Kayıt Düzenle</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark">

<div class="container mt-5">

<div class="card p-4 bg-secondary">

<h2 class="text-white mb-4">

✏️ Kayıt Düzenle

</h2>

<form method="POST">

<input class="form-control mb-3" name="ad" value="{{ kayit[1] }}">

<input class="form-control mb-3" name="telefon" value="{{ kayit[2] }}">

<input class="form-control mb-3" name="marka" value="{{ kayit[3] }}">

<input class="form-control mb-3" name="model" value="{{ kayit[4] }}">

<textarea class="form-control mb-3" name="ariza">{{ kayit[5] }}</textarea>

<label class="text-white mb-2">💰 Tamir Ücreti (₺)</label>

<input
type="number"
class="form-control mb-3"
name="ucret"
value="{{ kayit[7] }}">

<button class="btn btn-success">

💾 Kaydet

</button>

<a href="/admin" class="btn btn-danger">

İptal

</a>

</form>

</div>

</div>

</body>

</html>
